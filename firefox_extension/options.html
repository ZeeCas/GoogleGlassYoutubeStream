<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Glass Caster Options</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            width: 300px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 15px;
            background-color: #0078D7;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #005A9E;
        }
    </style>
</head>

<body>
    <label for="serverUrl">Python Server URL:</label>
    <input type="text" id="serverUrl" placeholder="http://192.168.1.254:5000">
    <button id="saveBtn">Save Configuration</button>
    <div id="status" style="margin-top: 10px; color: green;"></div>

    <script src="options.js"></script>
</body>

</html>
